# values-dev.yaml
# Override de configuración para el entorno de desarrollo.
# Se usa junto al values.yaml por defecto:
#   helm upgrade --install k8s helm/k8s -f helm/k8s/values.yaml -f helm/k8s/values-dev.yaml
#
# En desarrollo se usa una sola réplica y menos recursos, para no consumir
# capacidad innecesaria en el clúster local.

replicaCount: 1

image:
  pullPolicy: Always   # siempre traer la última imagen al probar en dev

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi
